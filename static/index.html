<!DOCTYPE html>
<html>
<head>
	<title>Restaurant</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<form id="orderForm" action="/orders" method="post">
		<div style="text-align: center;">
			<img src="img/logo.jpg" alt="Logo" style="max-width: 100%;">
		</div>
		<p>Thank you for working at Bob's pizza store.</p>
		<input type="text" id="name" name="name" placeholder="Name" required>
		<input type="text" id="product" name="product" placeholder="Product" required>
		<input type="number" id="price" name="price" placeholder="Price" step="0.01" min="0" required>
		<button type="submit">Add Order</button>
		<button type="reset">Reset</button>
		<ul id="orders"></ul>
	</form>
	
	<script>
		function fetchOrders() {
			return fetch("/orders").then(response => response.json());
		}

		function renderOrders(orders) {
			const ordersList = document.getElementById("orders");
			ordersList.innerHTML = "";
			for (const order of orders) {
				const li = document.createElement("li");
				li.textContent = `
					${order.name} ordered ${order.product} - $${order.price} at ${new Date(order.timestamp.time).toLocaleDateString("en-CA")}
				`;
				
				const deleteBtn = document.createElement("img");
				deleteBtn.src = "img/delete.png";
				deleteBtn.style.width = "16px";
				deleteBtn.style.height = "16px";
				deleteBtn.style.cursor = "pointer";
				deleteBtn.style.verticalAlign = "middle";

				deleteBtn.addEventListener("click", () => {
					fetch(`/orders?name=${order.name}&product=${order.product}&price=${order.price}&timestamp=${order.timestamp}`, {
						method: "DELETE"
					})
					.then(fetchOrders)
					.then(renderOrders);
				});
				li.appendChild(deleteBtn);
				
				const span = document.createElement("span");
				span.style.marginLeft = "5px";
				span.appendChild(deleteBtn);
				li.appendChild(span);
				
				ordersList.appendChild(li);
			}
		}

		const form = document.getElementById("orderForm");
		form.addEventListener("submit", event => {
			event.preventDefault();
			const name = document.getElementById("name").value;
			const product = document.getElementById("product").value;
			const price = document.getElementById("price").value;
			const now = new Date().getTime();

			fetch(`/orders?name=${name}&product=${product}&price=${price}&timestamp=${now}`, {
				method: "POST"
			})
			.then(fetchOrders)
			.then(renderOrders);
		});
	</script>
</body>
</html>
